<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحه مورد نظر یافت نشد | آرمان</title>
  <meta name="robots" content="noindex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #10b981 0%, #06b6d4 45%, #8b5cf6 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p { font-size: 1.25rem; color: rgba(255,255,255,0.5); margin: 1.5rem 0 2rem; max-width: 400px; line-height: 1.6; }
    a { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.875rem 2rem; background: #10b981; color: #09090b; font-weight: 900; border-radius: 9999px; text-decoration: none; transition: all 0.2s; font-size: 1rem; }
    a:hover { background: #34d399; transform: scale(1.05); }
    .dot { opacity: 0.2; font-size: 0.75rem; margin-top: 3rem; }
  </style>
  <script>
    sessionStorage.redirect = location.href;
  </script>
</head>
<body>
  <h1>۴۰۴</h1>
  <p>صفحه‌ای که به دنبال آن هستید وجود ندارد یا حذف شده است.</p>
  <a href="/my-portfolio/">بازگشت به خانه</a>
  <div class="dot">&bull;</div>
  <script>
    const path = location.pathname;
    if (path !== '/my-portfolio/' && path !== '/my-portfolio/404.html') {
      window.location.replace('/my-portfolio/');
    }
  </script>
</body>
</html>
